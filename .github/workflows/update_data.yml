name: Daily K-Market Data Update

on:
  schedule:
    - cron: '31 6 * * 1-5' # 매주 월~금, 한국시간 오후 3시 31분에 실행
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
           # 끝에 cloudscraper 를 추가합니다.
        run: pip install pandas requests beautifulsoup4 cloudscraper pykrx

      - name: Run Python Script
        run: python update_data.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add KPRICE.csv
          git commit -m "Auto-update daily market data" || echo "No changes to commit"
          git push
